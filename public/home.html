<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">
  <title>Adapty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="has-sidebar">

<div class="blob blob--1"></div>
<div class="blob blob--2"></div>

<div class="layout">

  <!-- Main -->
  <div class="main">

    <!-- Hero -->
    <div class="hero">
      <p class="hero__greeting">Hey, <span id="welcomeName"></span> 👋</p>
      <h1 class="hero__title">What do you want<br>to learn today?</h1>
      <p class="hero__sub">Generate a personalized learning roadmap powered by AI</p>
    </div>

    <!-- Input -->
    <form id="generateForm" class="form">
      <input id="skillInput" placeholder="e.g. Python, UI Design, SQL..." required>
      <button id="generateBtn">Generate</button>
    </form>

    <div id="generateStatus"></div>

    <!-- Roadmap -->
    <div id="roadmapSection" class="card" style="display:none;">
      <h2 id="roadmapTitle">Roadmap</h2>
      <div id="roadmapCanvas"></div>
    </div>

  </div>
</div>

<script src="sidebar.js"></script>
<script src="home.js"></script>
</body>
</html>
