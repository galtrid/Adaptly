<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Adapty</title>
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="has-sidebar">
  <main class="login-page" data-node-id="1:47">
    <section class="login-card" aria-label="Sign in panel" data-node-id="1:6">
      <img src="src/alpha.png" alt="Adaptly logo" class="login-icon" data-node-id="19:285" />
      <h1 class="login-title" data-node-id="1:8">Welcome</h1>
      <p class="login-subtitle" data-node-id="1:11">Enter your details below to sign in to your account</p>

      <form id="loginForm" class="login-form" novalidate>
        <label class="sr-only" for="loginEmail">Email</label>
        <input
          id="loginEmail"
          class="login-input"
          type="email"
          placeholder="Email"
          autocomplete="email"
          required
          data-node-id="1:9"
        />

        <label class="sr-only" for="loginPassword">Password</label>
        <input
          id="loginPassword"
          class="login-input"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          required
          data-node-id="1:10"
        />

        <div id="loginStatus" class="login-status" role="alert" aria-live="polite"></div>

        <button id="loginBtn" type="submit" class="login-button" data-node-id="1:3">Sign in</button>
      </form>

      <p class="login-footer" data-node-id="1:12">
        Don't have an account?
        <a href="register.html">Sign up.</a>
      </p>
    </section>
  </main>

  <script src="sidebar.js"></script>
  <script src="login.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Adapty</title>
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="has-sidebar">
  <main class="login-page">
    <section class="login-card register-card" aria-label="Sign up panel">
      <img src="src/alpha.png" alt="Adaptly logo" class="login-icon" />
      <h1 class="login-title">Get Started</h1>
      <p class="login-subtitle">Create your free account and start learning smarter</p>

      <form id="registerForm" class="login-form" novalidate>

        <label class="sr-only" for="regUsername">Username</label>
        <input id="regUsername" class="login-input" type="text" placeholder="Username"
               autocomplete="username" required />

        <label class="sr-only" for="regEmail">Email</label>
        <input id="regEmail" class="login-input" type="email" placeholder="Email"
               autocomplete="email" required />

        <label class="sr-only" for="regPassword">Password</label>
        <input id="regPassword" class="login-input" type="password" placeholder="Password"
               autocomplete="new-password" required />

        <label class="sr-only" for="regConfirm">Confirm Password</label>
        <input id="regConfirm" class="login-input" type="password" placeholder="Confirm Password"
               autocomplete="new-password" required />

        <div id="registerStatus" class="login-status" role="alert" aria-live="polite"></div>

        <button id="registerBtn" type="submit" class="login-button">Create Account</button>
      </form>

      <p class="login-footer">
        Already have an account?
        <a href="login.html">Log in.</a>
      </p>

    </section>
  </main>

  <script src="sidebar.js"></script>
  <script src="register.js"></script>
</body>
</html>
