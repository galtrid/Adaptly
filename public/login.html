<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">
  <title>Sign In — Adaptly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="has-sidebar">
  <main class="login-page" data-node-id="1:47">
    <section class="login-card" aria-label="Sign in panel" data-node-id="1:6">
      <img src="src/alpha.png" alt="Adaptly logo" class="login-icon" data-node-id="19:285" />
      <h1 class="login-title" data-node-id="1:8">Welcome</h1>
      <p class="login-subtitle" data-node-id="1:11">Enter your details below to sign in to your account</p>

      <form id="loginForm" class="login-form" novalidate>
        <label class="sr-only" for="loginEmail">Email</label>
        <input
          id="loginEmail"
          class="login-input"
          type="email"
          placeholder="Email"
          autocomplete="email"
          required
          data-node-id="1:9"
        />

        <label class="sr-only" for="loginPassword">Password</label>
        <input
          id="loginPassword"
          class="login-input"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          required
          data-node-id="1:10"
        />

        <div id="loginStatus" class="login-status" role="alert" aria-live="polite"></div>

        <button id="loginBtn" type="submit" class="login-button" data-node-id="1:3">Sign in</button>
      </form>

      <p class="login-footer" data-node-id="1:12">
        Don't have an account?
        <a href="register.html">Sign up.</a>
      </p>
    </section>
  </main>

  <script src="sidebar.js"></script>
  <script src="login.js"></script>
</body>
</html>
