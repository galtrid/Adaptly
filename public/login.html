<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Adapty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="adapty.css" />
</head>
<body class="has-sidebar">
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-brand">
        <div class="auth-brand__mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
          </svg>
        </div>
        <span class="auth-brand__name">adapty</span>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to continue your learning journey</p>

      <form id="loginForm" class="auth-form" novalidate>
        <label class="sr-only" for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" required />

        <label class="sr-only" for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" required />

        <div id="loginStatus" class="auth-status" role="alert" aria-live="polite"></div>

        <button id="loginBtn" type="submit" class="auth-btn">Sign in</button>
      </form>

      <p class="auth-footer">
        Don't have an account?
        <a href="register.html" class="auth-link">Sign up</a>
      </p>

    </div>
  </div>

  <script src="sidebar.js"></script>
  <script src="login.js"></script>
</body>
</html>
